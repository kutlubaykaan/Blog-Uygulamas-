<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
     <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />

    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>
<body class="bg-slate-400 flex items-center justify-center h-screen">
 <div class="bg-slate-600 p-8 rounded-xl w-80  space-y-7">
<h2 class="text-white text-xl font-bold text-center">
      Kayıt Ol
    </h2>

    <input id="username" type="text" placeholder="Username"
      class="w-full p-2 rounded bg-slate-800 text-white">

    <input id="email" type="email" placeholder="Email"
      class="w-full p-2 rounded bg-slate-800 text-white">

    <input id="password" type="password" placeholder="Password"
      class="w-full p-2 rounded bg-slate-800 text-white">

        <div class="card-actions">
          <button class="btn btn-primary" onclick="register()">Register</button>
        </div>


    <p id="successMsg" class="text-green-400 text-center hidden">
      Kayıt başarılı!
    </p>
<script>
      const API_URL = "https://api.zaferayan.com";
      const ENDPOINT = "/auth/register";

      const inputUsername = document.getElementById("username");
      const inputEmail = document.getElementById("email");
      const inputPassword = document.getElementById("password");

     function register() {
  const username = inputUsername.value;
  const email = inputEmail.value;
  const password = inputPassword.value;

  axios
    .post(API_URL + ENDPOINT, {
      username,
      email,
      password,
    })
    .then((res) => {
      const token = res.data.token;
      const user = res.data.user;

      localStorage.setItem("token", token);
      localStorage.setItem("user", JSON.stringify(user));

      const successMsg = document.getElementById("successMsg");
      successMsg.classList.remove("hidden");


      setTimeout(() => {
        window.location.href = "articles.html";
      }, 3000);
    });
}
</script>
 </div>   
</body>
</html>
