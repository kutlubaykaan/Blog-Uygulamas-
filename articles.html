<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Makaleler</title>


  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <script src="https://unpkg.com/axios/dist/axios.min.js"></script>
</head>

<body class="bg-slate-900 text-white">


  <div class="p-4 flex justify-between items-center border-b border-slate-500">
    <h1 class="text-xl font-bold">Makaleler</h1>

    <button 
      onclick="window.location.href='create-post.html'"
      class="btn btn-primary">
      Yeni Makale
    </button>
  </div>

  <div id="articles-container"
       class="grid md:grid-cols-3 sm:grid-cols-2 gap-4 p-6">
  </div>

<script>
const API_URL = "https://api.zaferayan.com";

async function getArticles() {
  try {
    const { data: articles } = await axios.get(API_URL + "/posts");

    const html = articles.map(({ title, body, author, category }) => `
      <div class="card bg-slate-400 shadow-lg">
        <div class="card-body">
          
          <h2 class="card-title">${title}</h2>
          
          <p class="text-sm text-gray-800">
            ${body}
          </p>

          <div class="card-actions justify-between items-center mt-4">
            
            <span class="text-xs">
              Yazar: ${author?.username || "Bilinmiyor"}
            </span>

            <div class="badge badge-primary badge-outline">
              ${category}
            </div>

          </div>

        </div>
      </div>
    `).join('');

    document.getElementById("articles-container").innerHTML = html;

  } catch (error) {
    console.error("Makale çekme hatası:", error);

    document.getElementById("articles-container").innerHTML = `
      <p class="text-red-400">Makaleler yüklenemedi.</p>
    `;
  }
}


getArticles();
</script>

</body>
</html>
